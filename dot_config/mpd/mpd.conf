# Files and directories #######################################################
#
# Uses XDG Base Dir spec -  https://specifications.freedesktop.org/basedir/latest/
#
music_directory			"/mnt/music/libraries"
playlist_directory		"~/.local/share/mpd/playlists"
db_file					"~/.local/share/mpd/database"
state_file				"~/.local/state/mpd/state"
sticker_file			"~/.local/share/sticker.sql"
bind_to_address			"any"
log_level				"verbose"
auto_update				"no"
auto_update_depth 		"4096"
follow_outside_symlinks "no"
follow_inside_symlinks	"yes"
replaygain				"off"
filesystem_charset		"UTF-8"


# Input #######################################################################
#
input {
        plugin "curl"
#       proxy "proxy.isp.com:8080"
#       proxy_user "user"
#       proxy_password "password"
}

#
###############################################################################

# Audio Output ################################################################
#
audio_output {
    type	"pipewire"
    name	"PipeWire"
}

audio_output {
	type	"fifo"
	name	"fifo output"
	path	"/tmp/mpd.fifo"
	format	"4410:16:2"
}
#
###############################################################################
